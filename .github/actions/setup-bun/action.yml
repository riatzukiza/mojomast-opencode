name: setup-bun
description: Setup Bun and install workspace dependencies (back-compat)
inputs:
  bun-version:
    description: Version of Bun to install (e.g., 1.3.0)
    required: false
    default: '1.3.0'
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun install dir
      uses: actions/cache@v4
      with:
        path: ~/.bun
        key: ${{ runner.os }}-bun-${{ inputs.bun-version }}
        restore-keys: |
          ${{ runner.os }}-bun-

    # Keep historical behavior: run `bun install` during setup for workflows that depend on it.
    - name: Install workspace dependencies
      shell: bash
      run: bun install --frozen-lockfile || bun install
