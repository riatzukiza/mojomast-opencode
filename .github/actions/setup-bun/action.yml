name: setup-bun
description: Setup Bun and install workspace dependencies (back-compat)
inputs:
  bun-version:
    description: Version of Bun to install (e.g., 1.3.0)
    required: false
    default: '1.3.0'
runs:
  using: composite
  steps:
    - name: Restore Bun cache (strict by version)
      id: bun-cache
      uses: actions/cache@v4
      with:
        path: ~/.bun
        key: bun-${{ runner.os }}-${{ inputs.bun-version }}-v3

    - name: Drop cache if version mismatches
      shell: bash
      run: |
        set -e
        REQ="${{ inputs.bun-version }}"
        if [ -x "$HOME/.bun/bin/bun" ]; then
          CUR="$($HOME/.bun/bin/bun --version | awk '{print $1}')"
          if [ "$CUR" != "$REQ" ]; then
            echo "Cached bun $CUR != requested $REQ; clearing ~/.bun"
            rm -rf "$HOME/.bun"
          fi
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    # Historical behavior: run bun install during setup
    - name: Install workspace dependencies
      shell: bash
      run: bun install --frozen-lockfile || bun install
