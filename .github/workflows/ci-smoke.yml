name: ci-smoke
on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  smoke-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Print context
        run: |
          echo "event=$GITHUB_EVENT_NAME"
          echo "actor=$GITHUB_ACTOR"
          echo "ref=$GITHUB_REF"
          echo "sha=$GITHUB_SHA"
      - name: Hello
        run: echo hello from ubuntu

  smoke-windows:
    runs-on: windows-latest
    steps:
      - name: Hello
        run: echo hello from windows

  smoke-macos:
    runs-on: macos-latest
    steps:
      - name: Hello
        run: echo hello from macos
