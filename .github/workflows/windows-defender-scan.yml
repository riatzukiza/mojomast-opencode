  defender:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download build bundle
        uses: actions/download-artifact@v4
        with:
          name: opencode-bundle
          path: bundle

      - name: Prepare scan dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path scan | Out-Null
          Expand-Archive -Path bundle/opencode.zip -DestinationPath scan -Force

      - name: Locate MpCmdRun.exe + mark start
        shell: pwsh
        run: |
          $mp = (Get-Command MpCmdRun.exe -ErrorAction SilentlyContinue)?.Path
          if (-not $mp) {
            $platformRoot = Join-Path $env:ProgramData 'Microsoft\Windows Defender\Platform'
            if (Test-Path $platformRoot) {
              $mp = Get-ChildItem $platformRoot -Recurse -Filter MpCmdRun.exe |
                    Sort-Object LastWriteTime -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
            }
          }
          if (-not $mp) { throw 'MpCmdRun.exe not found' }
          "MPCMDRUN=$mp" | Out-File -FilePath $env:GITHUB_ENV -Append
          # record time BEFORE we create the EICAR file so real-time hits are captured
          "DEFENDER_SINCE=$(Get-Date -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append

      # --- EICAR TEST FILE (runtime only; do NOT commit the string) ---
      - name: Create EICAR test file
        shell: pwsh
        run: |
          $scan = (Resolve-Path 'scan').Path
          $target = Join-Path $scan 'eicar.com'
          # Build the canonical EICAR string from parts to avoid storing it verbatim in the repo/logs
          $p1 = 'X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STAND'
          $p2 = 'ARD-ANTIVIRUS-TEST-FILE!$H+H*'
          $eicar = $p1 + $p2
          # Write exact ASCII bytes with no trailing newline
          Set-Content -LiteralPath $target -Value $eicar -NoNewline -Encoding Ascii

      - name: Update Defender signatures (optional but recommended)
        shell: pwsh
        run: |
          & "$env:MPCMDRUN" -SignatureUpdate

      - name: Windows Defender scan (directory)
        shell: pwsh
        run: |
          & "$env:MPCMDRUN" -Scan -ScanType 3 -File (Resolve-Path 'scan').Path

      - name: Collect Defender detections
        shell: pwsh
        run: |
          $since = [datetime]$env:DEFENDER_SINCE
          $scanPath = (Resolve-Path 'scan').Path
          $re = [Regex]::Escape($scanPath)
          $recent = Get-MpThreatDetection |
            Where-Object {
              $_.InitialDetectionTime -ge $since -and
              $_.Resources -and (($_.Resources.Resource) -match $re)
            }

          if ($recent) {
            $recent | ConvertTo-Json -Depth 5 | Out-File defender-detections.json -Encoding UTF8
            throw 'Windows Defender found detections (EICAR). See artifact.'
          } else {
            '{"status":"clean"}' | Out-File defender-detections.json -Encoding UTF8
          }

      - name: Upload scan results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: defender-scan-results
          path: defender-detections.json
