name: av-windows-defender
on:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (release tag)
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Checkout (PR/default)
        if: github.event_name != 'release'
        uses: actions/checkout@v4
      - name: Build and package
        uses: ./.github/actions/build-package
      - name: Upload build bundle
        uses: actions/upload-artifact@v4
        with:
          name: opencode-bundle
          path: bundle/opencode.zip

  defender:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download build bundle
        uses: actions/download-artifact@v4
        with:
          name: opencode-bundle
          path: bundle

      - name: Prepare scan dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path scan | Out-Null
          Expand-Archive -Path bundle/opencode.zip -DestinationPath scan -Force

      - name: Locate MpCmdRun.exe + assert Defender is active + mark start
        id: envdef
        shell: pwsh
        run: |
          $mp = (Get-Command MpCmdRun.exe -ErrorAction SilentlyContinue)?.Path
          if (-not $mp) {
            $root = Join-Path $env:ProgramData 'Microsoft\Windows Defender\Platform'
            if (Test-Path $root) {
              $mp = Get-ChildItem $root -Recurse -Filter MpCmdRun.exe |
                    Sort-Object LastWriteTime -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
            }
          }
          if (-not $mp) { throw 'MpCmdRun.exe not found' }

          # AFTER (works on GH runners)
          $s = Get-MpComputerStatus
          if ($s.AMRunningMode -notin @('Normal','Passive') -or -not $s.AMServiceEnabled) {
            throw "Defender engine unavailable (AMRunningMode=$($s.AMRunningMode), AMServiceEnabled=$($s.AMServiceEnabled))"
          }
          Write-Host "Defender status: AMRunningMode=$($s.AMRunningMode), RTP=$($s.RealTimeProtectionEnabled) - continuing (RTP not required for on-demand scans)."

          "MPCMDRUN=$mp" | Out-File -FilePath $env:GITHUB_ENV -Append
          "DEFENDER_SINCE=$(Get-Date -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append

      # --- create a harmless but detectable file (EICAR) ---
      - name: Create EICAR test file (ASCII, no newline)
        shell: pwsh
        run: |
          $scan = (Resolve-Path 'scan').Path
          $target = Join-Path $scan 'eicar.com'
          $p1 = 'X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STAND'
          $p2 = 'ARD-ANTIVIRUS-TEST-FILE!$H+H*'
          Set-Content -LiteralPath $target -Value ($p1+$p2) -NoNewline -Encoding Ascii

      - name: Provoke RTP (force read)
        shell: pwsh
        run: |
          cmd /c type scan\eicar.com >NUL
          Start-Sleep -Seconds 10  # give logs time to surface

      - name: On-demand scan EICAR file
        shell: pwsh
        run: |
          $scan = (Resolve-Path 'scan').Path
          $target = Join-Path $scan 'eicar.com'
          & "$env:MPCMDRUN" -Scan -ScanType 3 -File $target
          Start-Sleep -Seconds 10  # allow detection telemetry to flush

      # assert detection, but do NOT fail here; report via step output
      - name: Collect detections and set outputs
        id: detect
        shell: pwsh
        run: |
          $since     = [datetime]$env:DEFENDER_SINCE
          $scanPath  = (Resolve-Path 'scan').Path
          $eicarPath = Join-Path $scanPath 'eicar.com'

          function Get-Detections {
            param(
              [datetime]$Start,
              [string]$EicarPath
            )

            $results = Get-MpThreatDetection | Where-Object { $_.InitialDetectionTime -ge $Start }

            $eicarHits = @()
            $realHits  = @()

            foreach ($item in $results) {
              $isEicar = $false
              try {
                if ($item.ThreatName -match 'EICAR') { $isEicar = $true }
              } catch {}
              try {
                if (-not $isEicar -and $item.Resources -and ($item.Resources.Resource | Where-Object { $_ -ieq $EicarPath })) {
                  $isEicar = $true
                }
              } catch {}

              if ($isEicar) { $eicarHits += $item }
              if (-not $isEicar) { $realHits += $item }
            }

            return [pscustomobject]@{ Eicar = $eicarHits; Real = $realHits }
          }

          # wait a bit before polling so telemetry has time to arrive on slow runners
          Start-Sleep -Seconds 20

          # poll (up to 120s) because Defender threat history entries can be delayed
          $deadline = (Get-Date).AddSeconds(120)
          $interval = 5
          $detections = $null

          do {
            $detections = Get-Detections -Start $since -EicarPath $eicarPath
            if (($detections.Eicar.Count -gt 0) -or ($detections.Real.Count -gt 0)) { break }
            if ((Get-Date) -ge $deadline) { break }
            Start-Sleep -Seconds $interval
          } while ($true)

          if (-not $detections) {
            $detections = [pscustomobject]@{ Eicar = @(); Real = @() }
          }

          $eicar = $detections.Eicar
          $real  = $detections.Real

          # 2) (optional) also harvest Defender Operational events for context/evidence
          $events = @()
          try {
            $events = Get-WinEvent -FilterHashtable @{ LogName='Microsoft-Windows-Windows Defender/Operational'; StartTime=$since } |
                      Where-Object { $_.Id -in 1116,1117 } |
                      ForEach-Object { [pscustomobject]@{ Id=$_.Id; TimeCreated=$_.TimeCreated; Message=$_.FormatDescription() } }
          } catch { }

          # 3) write a structured artifact
          [pscustomobject]@{
            since      = $since
            eicarHits  = $eicar
            realHits   = $real
            eventLog   = $events
          } | ConvertTo-Json -Depth 6 | Out-File defender-detections.json -Encoding UTF8

          # 4) expose stable, lowercase outputs for gating
          $eicarVerified = ($eicar.Count -gt 0)
          $realCount     = $real.Count
          Add-Content -Path $env:GITHUB_OUTPUT -Value ("eicar_verified=" + $eicarVerified.ToString().ToLowerInvariant())
          Add-Content -Path $env:GITHUB_OUTPUT -Value ("real_detections=" + ([bool]($realCount -gt 0)).ToString().ToLowerInvariant())
          Add-Content -Path $env:GITHUB_OUTPUT -Value ("real_count=" + $realCount)

      - name: Upload scan results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: defender-detections
          path: defender-detections.json

      # fail if EICAR missing OR real threats present
      - name: Fail if EICAR not detected or real detections found
        if: steps.detect.outputs.eicar_verified != 'true' || steps.detect.outputs.real_detections == 'true'
        shell: pwsh
        run: exit 1

      # (optional) now run your on-demand directory scan of the bundle
      - name: Windows Defender scan (directory)
        shell: pwsh
        run: |
          & "$env:MPCMDRUN" -SignatureUpdate
          & "$env:MPCMDRUN" -Scan -ScanType 3 -File (Resolve-Path 'scan').Path
