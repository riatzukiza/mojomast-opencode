name: owasp-dependency-check
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # weekly, 03:00 UTC Mondays

jobs:
  depcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      # Cache DC data to speed up runs
      - name: Cache dependency-check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data/
          key: depcheck-data-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            depcheck-data-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@v4.1.3
        with:
          project: "OpenCode"
          path: "."
          format: "HTML,JSON"
          out: "dependency-check-report"
          # optionally: args: "--enableRetired"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: owasp-depcheck-report
          path: dependency-check-report
